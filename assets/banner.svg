<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d0d"/>
      <stop offset="50%"  stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="44"  x2="900" y2="44"/>
    <line x1="0" y1="88"  x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
    <line x1="0" y1="176" x2="900" y2="176"/>
    <line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/>
  </g>

  <!-- top accent line animated -->
  <rect x="0" y="0" width="900" height="3" fill="url(#titleGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Eye of Horus symbol (left side) -->
  <g transform="translate(88,110)" filter="url(#glow)">
    <!-- outer eye shape -->
    <ellipse cx="0" cy="0" rx="38" ry="22" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5">
      <animate attributeName="rx" values="38;42;38" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <!-- pupil -->
    <circle cx="0" cy="0" r="10" fill="#00e5ff" opacity="0.9">
      <animate attributeName="r" values="10;12;10" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="#0d1117"/>
    <!-- pupil dot -->
    <circle cx="0" cy="0" r="2" fill="#00ff88">
      <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- left wing -->
    <path d="M -38,0 Q -55,-12 -68,0" fill="none" stroke="url(#eyeGrad)" stroke-width="2">
      <animate attributeName="d" values="M -38,0 Q -55,-12 -68,0;M -42,0 Q -60,-14 -74,0;M -38,0 Q -55,-12 -68,0" dur="4s" repeatCount="indefinite"/>
    </path>
    <!-- right wing -->
    <path d="M 38,0 Q 55,-12 68,0" fill="none" stroke="url(#eyeGrad)" stroke-width="2">
      <animate attributeName="d" values="M 38,0 Q 55,-12 68,0;M 42,0 Q 60,-14 74,0;M 38,0 Q 55,-12 68,0" dur="4s" repeatCount="indefinite"/>
    </path>
    <!-- drop below (Horus marking) -->
    <path d="M 8,12 L 14,30 L 4,36" fill="none" stroke="url(#eyeGrad)" stroke-width="2" stroke-linecap="round"/>
    <!-- scan line -->
    <line x1="-38" y1="0" x2="38" y2="0" stroke="#00ff88" stroke-width="0.5" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- HORUS title -->
  <text x="200" y="85" font-family="'Courier New', Courier, monospace" font-size="68"
        font-weight="bold" fill="url(#titleGrad)" filter="url(#titleGlow)" letter-spacing="8">
    HORUS
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle -->
  <text x="202" y="118" font-family="'Courier New', Courier, monospace" font-size="15"
        fill="#64748b" letter-spacing="2">
    IOC ENRICHMENT  ·  PE STATIC ANALYSIS  ·  THREAT INTEL
  </text>

  <!-- animated scan bar -->
  <rect x="198" y="128" width="0" height="2" fill="url(#titleGrad)" opacity="0.8">
    <animate attributeName="width" values="0;560;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- tag badges row -->
  <g transform="translate(200,152)">
    <!-- Windows badge -->
    <rect x="0" y="0" width="88" height="24" rx="4" fill="#0078D710"/>
    <rect x="0" y="0" width="88" height="24" rx="4" fill="none" stroke="#0078D7" stroke-width="1"/>
    <text x="44" y="16" font-family="monospace" font-size="11" fill="#0078D7" text-anchor="middle">Windows x64</text>
    <!-- C++17 badge -->
    <rect x="96" y="0" width="62" height="24" rx="4" fill="#00599C10"/>
    <rect x="96" y="0" width="62" height="24" rx="4" fill="none" stroke="#00599C" stroke-width="1"/>
    <text x="127" y="16" font-family="monospace" font-size="11" fill="#00599C" text-anchor="middle">C++ 17</text>
    <!-- zero deps badge -->
    <rect x="166" y="0" width="110" height="24" rx="4" fill="#2ea04310"/>
    <rect x="166" y="0" width="110" height="24" rx="4" fill="none" stroke="#2ea043" stroke-width="1"/>
    <text x="221" y="16" font-family="monospace" font-size="11" fill="#2ea043" text-anchor="middle">zero dependencies</text>
    <!-- free badge -->
    <rect x="284" y="0" width="60" height="24" rx="4" fill="#9333ea10"/>
    <rect x="284" y="0" width="60" height="24" rx="4" fill="none" stroke="#9333ea" stroke-width="1"/>
    <text x="314" y="16" font-family="monospace" font-size="11" fill="#9333ea" text-anchor="middle">MIT</text>
  </g>

  <!-- version tag top right -->
  <text x="862" y="26" font-family="monospace" font-size="12" fill="#00ff8880" text-anchor="end">v1.0.0</text>

  <!-- bottom accent line -->
  <rect x="0" y="217" width="900" height="3" fill="url(#titleGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- corner decorations -->
  <g stroke="#00e5ff30" stroke-width="1" fill="none">
    <polyline points="4,4 4,20 20,20"/>
    <polyline points="896,4 896,20 880,20"/>
    <polyline points="4,216 4,200 20,200"/>
    <polyline points="896,216 896,200 880,200"/>
  </g>
</svg>
